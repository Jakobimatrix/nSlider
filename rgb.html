<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/nSlider.css">
    <script src="js/nSlider.js" type="text/javascript"></script>
</head>
<div class="m-4">
    <h1>RGB Color Picker</h1>
    <p>
        Use the sliders to adjust the RGB values and see the resulting color in the box below. 
        This is a terrible method to pick a color. There are color pickers for that...
    </p>
    <p>
        Observe how the sliders can go past each other.<br>
        Furthermore, marvel at the handy ticks generated by NSlider.
    </p>
</div>
<div class="m-4 img-thumbnail">
    <div class="n-slider"
        id="rgbSlider"
        handle_crossing="yes,nogap"
        min="0" max="255"
        stepsize="1"
        ticks-big="50">

        <div id="redHandle" class="handle handle3DDial" value="120" style="--handle-color:red"></div>
        <div id="greenHandle" class="handle handle3DDial" value="180" style="--handle-color:green"></div>
        <div id="blueHandle" class="handle handle3DDial" value="220" style="--handle-color:blue"></div>
    </div>
</div>

<div id="colorBox" style="height:150px" class="m-5 img-thumbnail"></div>

<script>
const slider = new NSlider(document.getElementById("rgbSlider"), values => {
    const r = values.find(v => v.id === "redHandle").value;
    const g = values.find(v => v.id === "greenHandle").value;
    const b = values.find(v => v.id === "blueHandle").value;
    document.getElementById("colorBox").style.backgroundColor =
        `rgb(${r},${g},${b})`;
});
</script>
</body>
</html>
